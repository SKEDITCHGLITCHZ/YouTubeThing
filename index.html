<!DOCTYPE html>
<html>
<head>
  <title>Locked Video</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* disables clicking */
    }
  </style>
</head>
<body>

<iframe 
  src="https://www.youtube.com/embed/ar01WqD1gNY?autoplay=1&loop=1&playlist=ar01WqD1gNY&controls=0&mute=1"
  frameborder="0"
  allow="autoplay">
</iframe>

<script>
  // Try to force fullscreen (user may still need to tap once)
  document.documentElement.requestFullscreen?.();

  // Block most keyboard input (adds to the “locked” feel)
  document.addEventListener("keydown", e => e.preventDefault());
</script>

</body>
</html>
