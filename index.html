<!DOCTYPE html>
<html>
<head>
  <title>Video Page</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;

      overflow: hidden;
      background: black;

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* disables clicking */
    }
  </style>
</head>
<body>

<iframe 
  src="https://www.youtube.com/embed/ar01WqD1gNY?si=D470y7UK4lfcmBQLautoplay=1&loop=1&playlist=VIDEO_ID&controls=0&mute=1"
  frameborder="0"
  allow="autoplay">
</iframe>

</body>
</html>
