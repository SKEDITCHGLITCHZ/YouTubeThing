<!DOCTYPE html>
<html>
<head>
  <title>Locked Video</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none; /* prevents interaction */
    }
  </style>
</head>
<body>

<video autoplay loop muted playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<script>
  // Try fullscreen
  document.documentElement.requestFullscreen?.();

  // Block keys (adds to the “locked” feel)
  document.addEventListener("keydown", e => e.preventDefault());
</script>

</body>
</html>
